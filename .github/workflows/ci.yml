name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality and Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Use repository npm version
        run: npm install --global npm@11.6.1

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Production HTTP smoke
        run: npm run test:smoke
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  database:
    name: Migration and RLS Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: local-ci-client
      SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: local-ci-secret

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Use repository npm version
        run: npm install --global npm@11.6.1

      - name: Install dependencies
        run: npm ci

      - name: Start clean local Supabase
        run: npm run supabase:start

      - name: Test migrations and RLS
        run: npm run supabase:test:db

      - name: Stop local Supabase
        if: always()
        run: npm run supabase:stop
